name: Deploy to GitHub Pages

on:
  # `main`ブランチにプッシュするたびにワークフローをトリガーします。
  # 別のブランチを使用している場合は、`main`をそのブランチ名に置き換えてください。
  push:
    branches: [ main ]
  # GitHub上のActionsタブからこのワークフローを手動で実行できます。
  workflow_dispatch:

# このジョブがリポジトリをクローンし、ページデプロイメントを作成することを許可します。
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout your repository using git
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      # pnpm/action-setup のブートストラップ self-update を避けるため Corepack を使用
      - name: Enable pnpm via Corepack
        run: corepack enable && corepack prepare pnpm@11.12.0 --activate

      - name: Setup pnpm cache
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Restore Astro cache
        id: astro-cache-restore
        uses: actions/cache/restore@v6
        with:
          path: node_modules/.astro
          key: astro-cache-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            astro-cache-${{ runner.os }}-

      - name: Build
        run: pnpm build
        env:
          PUBLIC_GA_MEASUREMENT_ID: ${{ secrets.GA_MEASUREMENT_ID }}

      - name: Save Astro cache
        if: steps.astro-cache-restore.outputs.cache-hit != 'true'
        uses: actions/cache/save@v6
        with:
          path: node_modules/.astro
          key: ${{ steps.astro-cache-restore.outputs.cache-primary-key }}

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: dist/
          include-hidden-files: true

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
